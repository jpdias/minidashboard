<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>miniDash Config</title>
<link rel="stylesheet" href="/style.css">
</head><body>
<h1>miniDash</h1>
<div class="cols">
<div class="col">
<h3>Configuration</h3>
<form method="post" action="/save">
<label for="ssid">WiFi SSID</label>
<input id="ssid" name="ssid" value="{{SSID}}">
<label for="pass">WiFi Password</label>
<input id="pass" name="pass" type="password" placeholder="(unchanged if blank)">
<label for="hn">Hostname (mDNS: &lt;name&gt;.local)</label>
<input id="hn" name="hn" value="{{HN}}">
<label for="lat">Latitude</label>
<input id="lat" name="lat" value="{{LAT}}">
<label for="lon">Longitude</label>
<input id="lon" name="lon" value="{{LON}}">
<label for="tz">Timezone</label>
<select id="tz" name="tz">{{TZ_OPTIONS}}</select>
<label for="wi">Weather refresh (sec, min 60)</label>
<input id="wi" name="wi" value="{{WI}}">
<label for="me">Show metrics (0/1)</label>
<input id="me" name="me" value="{{ME}}">
<label for="ns">Night start hour (0-23, same as end = off)</label>
<input id="ns" name="ns" value="{{NS}}">
<label for="ne">Night end hour (0-23)</label>
<input id="ne" name="ne" value="{{NE}}">
<label for="ni">NTP resync (minutes)</label>
<input id="ni" name="ni" value="{{NI}}">
<label for="eh">ESPHome host (e.g. ikea-hack.lan)</label>
<input id="eh" name="eh" value="{{EH}}">
<label for="ehs">ESPHome sensors (slug=label per line)</label>
<div id="ehsRows" class="rows"></div>
<button type="button" onclick="addRow('ehsRows','ehs')">+ Add sensor</button>
<label for="mon">Monitors (one host per line)</label>
<div id="monRows" class="rows"></div>
<button type="button" onclick="addRow('monRows','mon')">+ Add host</button>
<label for="fr">Flight radar range (nm, 0=off)</label>
<input id="fr" name="fr" value="{{FR}}">
<label>Enabled screens</label>
<input type="hidden" name="scr" value="1">
<div class="chk">
<label class="cb"><input type="checkbox" name="sc0" {{SC0}}> Clock</label>
<label class="cb"><input type="checkbox" name="sc1" {{SC1}}> ESPHome</label>
<label class="cb"><input type="checkbox" name="sc2" {{SC2}}> Forecast</label>
<label class="cb"><input type="checkbox" name="sc3" {{SC3}}> Weather Detail</label>
<label class="cb"><input type="checkbox" name="sc4" {{SC4}}> Monitors</label>
<label class="cb"><input type="checkbox" name="sc5" {{SC5}}> Flight Radar</label>
<label class="cb"><input type="checkbox" name="sc6" {{SC6}}> System</label>
</div>
<label>Backlight (transistor on D8)</label>
<div class="chk">
<label class="cb"><input type="checkbox" name="blc" {{BLC}}> Enable control</label>
<label class="cb"><input type="checkbox" name="blh" {{BLH}}> Active-high (ON = HIGH)</label>
</div>
<br><br>
<button type="submit">Save &amp; Reboot</button>
</form>
<hr>
<h3>Firmware / FS Update</h3>
<form method="POST" action="/update" enctype="multipart/form-data">
<label for="fw">firmware.bin or littlefs.bin</label>
<input type="file" id="fw" name="update" accept=".bin">
<br><br>
<button type="submit">Upload &amp; Flash</button>
</form>
<p class="foot">Device: {{IP}}</p>
</div>
<div class="col wide">
<h3>Live Log</h3>
<div class="term" id="log">{{LOG}}</div>
<details class="cfgraw">
  <summary>Edit config.json</summary>
  <p class="hint">Raw JSON. Validated on save (ranges clamped, strings capped, unknown keys ignored). Reboots on save.</p>
  <form method="post" action="/config.json">
    <textarea id="cfgjson" name="config" rows="22" spellcheck="false">{{CFGJSON}}</textarea>
    <br>
    <button type="submit">Save JSON &amp; Reboot</button>
    <span id="cfgmsg" class="cfgmsg"></span>
  </form>
</details>
</div>
</div>
<script>
// Build a list of input rows from a newline-separated seed string. Each row is a
// text input sharing the same name (server collects all of them). The last row
// gets an "x" remove button.
function buildRows(containerId, name, seed){
  var box=document.getElementById(containerId);
  box.innerHTML='';
  var items=seed.split('\n').map(function(s){return s.trim();}).filter(function(s){return s.length;});
  if(items.length===0) items.push('');
  items.forEach(function(v){ addRow(containerId, name, v); });
}
function addRow(containerId, name, val){
  var box=document.getElementById(containerId);
  var row=document.createElement('div');
  row.className='row';
  var inp=document.createElement('input');
  inp.type='text'; inp.name=name; inp.value=(val!==undefined?val:'');
  var del=document.createElement('button');
  del.type='button'; del.className='del'; del.textContent='x';
  del.onclick=function(){ row.remove(); };
  row.appendChild(inp); row.appendChild(del);
  box.appendChild(row);
}
setInterval(function(){
  fetch('/logtext').then(function(r){return r.text();}).then(function(t){
    var el=document.getElementById('log');
    el.textContent=t;
    el.scrollTop=el.scrollHeight;
  });
},2000);
buildRows('ehsRows','ehs',"{{EHS}}".replace(/,/g,'\n'));
buildRows('monRows','mon',"{{MON}}".replace(/,/g,'\n'));
// Submit the raw JSON editor via fetch so validation errors are shown inline
// instead of dropping into the reboot page. On success the device reboots, so we
// redirect back to the config page after a short pause (mirrors the form's save).
document.querySelector('form[action="/config.json"]').addEventListener('submit',function(e){
  e.preventDefault();
  var ta=document.getElementById('cfgjson');
  var msg=document.getElementById('cfgmsg');
  msg.textContent='saving...';
  msg.style.color='#aa0';
  fetch('/config.json',{method:'POST',headers:{'Content-Type':'text/plain'},body:ta.value})
    .then(function(r){ return r.text().then(function(t){ return {ok:r.ok, t:t}; }); })
    .then(function(res){
      if(res.ok){
        msg.textContent='saved - rebooting, returning to config...';
        msg.style.color='#0a0';
        setTimeout(function(){ location.href='/'; }, 2500);
      }
      else { msg.textContent=res.t; msg.style.color='#c33'; }
    })
    .catch(function(err){ msg.textContent='network error: '+err; msg.style.color='#c33'; });
});
</script>
</body></html>
