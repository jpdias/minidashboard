<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>miniDash Config</title>
<link rel="stylesheet" href="/style.css">
</head><body>
<h1>miniDash</h1>
<div class="cols">
<div class="col">
<h3>Configuration</h3>
<form method="post" action="/save">
<label for="ssid">WiFi SSID</label>
<input id="ssid" name="ssid" value="{{SSID}}">
<label for="pass">WiFi Password</label>
<input id="pass" name="pass" type="password" placeholder="(unchanged if blank)">
<label for="lat">Latitude</label>
<input id="lat" name="lat" value="{{LAT}}">
<label for="lon">Longitude</label>
<input id="lon" name="lon" value="{{LON}}">
<label for="tz">Timezone</label>
<select id="tz" name="tz">{{TZ_OPTIONS}}</select>
<label for="wi">Weather refresh (sec, min 60)</label>
<input id="wi" name="wi" value="{{WI}}">
<label for="me">Show metrics (0/1)</label>
<input id="me" name="me" value="{{ME}}">
<label for="eh">ESPHome host (e.g. ikea-hack.lan)</label>
<input id="eh" name="eh" value="{{EH}}">
<label for="mon">Monitors (comma separated)</label>
<input id="mon" name="mon" value="{{MON}}">
<br><br>
<button type="submit">Save &amp; Reboot</button>
</form>
<p class="foot">Device: {{IP}}</p>
</div>
<div class="col">
<h3>Live Log</h3>
<div class="term" id="log">{{LOG}}</div>
</div>
</div>
<script>
setInterval(function(){
  fetch('/logtext').then(function(r){return r.text();}).then(function(t){
    var el=document.getElementById('log');
    el.textContent=t;
    el.scrollTop=el.scrollHeight;
  });
},2000);
</script>
</body></html>
